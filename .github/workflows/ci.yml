name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Upgrade pip
        run: pip install --upgrade pip
      - name: Install HA test framework
        run: pip install pytest-homeassistant-custom-component>=0.13 ruff>=0.4
      - name: Install integration dependencies
        run: pip install pysensorlinx>=0.1.9
      - name: Run tests
        run: pytest
      - name: Run mypy
        run: mypy custom_components/sensorlinx

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff>=0.4
      - name: Run ruff check
        run: ruff check .
      - name: Run ruff format
        run: ruff format --check .

  hassfest:
    name: Validate with hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: Validate with HACS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hacs/action@main
        with:
          category: integration
